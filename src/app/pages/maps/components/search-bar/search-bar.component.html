<div class="search-container">
  <input
    type="text"
    class="form-control"
    placeholder="Buscar..."
    #txtQuery
    (keyup)="onQueryChanged(txtQuery.value)"
    (click)="$event.stopPropagation()"
    (click)="openSearch()"
  >

  <app-search-results *ngIf="showResults"></app-search-results>
  
</div>
