<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Mis Datos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="userData">
    <ion-card-header>
      <ion-card-title style="text-align: center; font-size: 20px;">Información Personal</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <!-- Campos de edición del usuario -->
      <ion-item>
        <ion-label position="floating" style="color: rgb(255, 0, 0);">UID:</ion-label>
        <ion-input [(ngModel)]="userData.uid" style="color: rgb(255, 0, 0);" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Nombre</ion-label>
        <ion-input [(ngModel)]="userData.pnombre" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked" >Segundo Nombre</ion-label>
        <ion-input [(ngModel)]="userData.snombre" readonly placeholder="(No haz inscrito tu segundo nombre)"></ion-input>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">Primer Apellido</ion-label>
        <ion-input [(ngModel)]="userData.papellido" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Segundo Apellido</ion-label>
        <ion-input [(ngModel)]="userData.sapellido" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Fecha de Nacimiento</ion-label>
        <ion-input [(ngModel)]="formatFechaNacimiento" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Rut</ion-label>
        <ion-input [(ngModel)]="userData.rut" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Email</ion-label>
        <ion-input [(ngModel)]="userData.email" readonly></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Teléfono</ion-label>
        <ion-input [(ngModel)]="userData.celular" name="celular" required="" minlength="9" maxlength="9" pattern="^[0-9]{9}$" (ionBlur)="validarCelular()" #celularImput="ngModel"></ion-input>
      </ion-item>
      <ion-text color="danger" *ngIf="celularImput.invalid && celularImput.touched">
        El número de teléfono debe tener 9 dígitos.
      </ion-text>

      <br>

      <!-- Botón para guardar cambios -->
      <ion-button expand="block" color="warning" (click)="actualizarUser()" [disabled]="celularImput.invalid || !userData.celular || userData.celular.toString().length !== 9">Guardar Cambios</ion-button> 
    </ion-card-content>
  </ion-card>

  <ion-card *ngIf="!userData">
    <ion-card-content>Cargando datos del usuario...</ion-card-content>
  </ion-card>
</ion-content>
