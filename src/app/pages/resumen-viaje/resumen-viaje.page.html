<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Su viaje</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid padding>
    <ion-row>
      <!-- Columna para Capacidad -->
      <ion-col size="6">
        <div class="info-item">
          <ion-label class="info-title">Capacidad:</ion-label>
          <div class="info-value">{{ numAsientos }}</div>
        </div>
      </ion-col>

      <!-- Columna para Precio -->
      <ion-col size="6">
        <div class="info-item">
          <ion-label class="info-title">Precio:</ion-label>
          <div class="info-value">{{ precio }}</div>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>

    <div #mapDiv class="map-container"></div>

    <ion-grid>
      <ion-row>
        <ion-col size="6" class="btn-finalizar">
          <ion-button expand="block" color="danger" (click)="confirmarFinalizacion()">Finalizar</ion-button>
        </ion-col>
        <ion-col size="6" class="qr">
          <!-- Botón con iconos de QR y Cámara -->
          <ion-button expand="block" color="dark" routerLink="/qr">
            <ion-icon name="camera-outline"></ion-icon>
            <span style="margin: 0 5px;">/</span>
            <ion-icon name="qr-code-outline"></ion-icon>
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>

</ion-content>
